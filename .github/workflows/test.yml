name: test
on:
  push:
    branches:
      - main
    paths:
      - tools/cmd/**/*.go
      - tools/internal/**/*.go
      - tools/go.mod
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - tools/cmd/**/*.go
      - tools/internal/**/*.go
      - tools/go.mod
permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tools/
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ^1.22
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4
      - name: testing
        run: go test -race -shuffle=on ./...
