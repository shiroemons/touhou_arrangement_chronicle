version: "3.8"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: touhou_arrangement_chronicle_development
    ports:
      - '15432:5432'
    volumes:
      - postgres:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: "./docker/psqldef/Dockerfile"
    volumes:
      - ./db:/app/db
      - go_pkg:/go/pkg
    working_dir: /app
    command:
      - "./psqldef"
      - "--file"
      - "./db/schema/schema.sql"
      - "--host"
      - "db"
      - "--port"
      - "15432"
      - "touhou_arrangement_chronicle_development"
    depends_on:
      - db
    profiles:
      - extra

  seeder:
    image: golang:1.20
    stdin_open: true
    tty: true
    depends_on:
      - db
    profiles:
      - extra
    environment:
      CONNECT_URL: "postgres://postgres:@db:5432/touhou_arrangement_chronicle_development?sslmode=disable"
      BUNDEBUG: 1
    volumes:
      - .:/app
      - go_pkg:/go/pkg
    working_dir: /app
    command:
      - "go"
      - "run"
      - "cmd/seeder/main.go"

  indexer:
    image: golang:1.20
    stdin_open: true
    tty: true
    depends_on:
      - db
      - meilisearch
    profiles:
      - extra
    environment:
      CONNECT_URL: "postgres://postgres:@db:5432/touhou_arrangement_chronicle_development?sslmode=disable"
      BUNDEBUG: 1
      MEILISEARCH_HOST: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: "MASTER_KEY"
    volumes:
      - .:/app
      - go_pkg:/go/pkg
    working_dir: /app
    command:
      - "go"
      - "run"
      - "cmd/indexer/main.go"
      - "cmd/indexer/original_songs.go"
      - "cmd/indexer/songs.go"
      - "cmd/indexer/setup.go"

  importer:
    image: golang:1.20
    stdin_open: true
    tty: true
    depends_on:
      - db
    profiles:
      - extra
    environment:
      CONNECT_URL: "postgres://postgres:@db:5432/touhou_arrangement_chronicle_development?sslmode=disable"
      BUNDEBUG: 1
    volumes:
      - .:/app
      - go_pkg:/go/pkg
    working_dir: /app
    command:
      - "go"
      - "run"
      - "cmd/importer/main.go"
      - "cmd/importer/import_events.go"
      - "cmd/importer/import_circles.go"
      - "cmd/importer/import_artists.go"
      - "cmd/importer/import_albums_and_songs.go"
      - "cmd/importer/import_album_service_urls.go"

  meilisearch:
    image: getmeili/meilisearch:v1.1.1
    volumes:
      - meili-data:/meili_data
    ports:
      - '17700:7700'
    command:
      - "meilisearch"
      - "--master-key=MASTER_KEY"

volumes:
  go_pkg:
  postgres:
  meili-data:
    driver: local
